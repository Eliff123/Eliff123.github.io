<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt | Pärson Hotels</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <img src="https://images.unsplash.com/photo-1528909514045-2fa4ac7a08ba?q=80&w=1600" alt="Kontakt bild">
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1>Kontakt</h1>

    <p>
      Har du frågor om bröllop, konferenser eller speciella önskemål?  
      Fyll i formuläret så återkommer vi så snabbt som möjligt.
    </p>

    <div class="contact-card">

      <form>

        <div class="row">
          <div class="col-md-6">
            <label>Namn</label>
            <input type="text" class="form-control" placeholder="Ditt namn">
          </div>

          <div class="col-md-6">
            <label>E-post</label>
            <input type="email" class="form-control" placeholder="din@mail.com">
          </div>
        </div>

        <label>Ämne</label>
        <select class="form-control">
          <option></option>
          <option>Bröllop</option>
          <option>Konferens</option>
          <option>Specialförfrågan</option>
          <option>Övrigt</option>
        </select>

        <label>Meddelande</label>
        <textarea class="form-control" rows="5" placeholder="Skriv ditt meddelande här..."></textarea>

        <button type="submit" class="btn btn-primary w-100 mt-3">
          Skicka förfrågan
        </button>

      </form>

    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="row text-center text-md-start">

        <div class="col-md-4 mb-4">
          <h5>Kontakta oss</h5>
          <p>Storgatan 1</p>
          <p>123 45 Stad</p>
          <p>Tel: 012-345 6789</p>
        </div>

        <div class="col-md-4 mb-4">
          <h5>Snabblänkar</h5>
          <ul class="list-unstyled">
            <li><a href="index.html">Hem</a></li>
            <li><a href="rum.html">Våra Rum</a></li>
            
            <li><a href="restaurang.html">Restaurang</a></li>
          </ul>
        </div>

        <div class="col-md-4 mb-4 text-md-end">
          <h5>Följ oss</h5>
        </div>

      </div>
    </div>
  </footer>

</body>
</html>

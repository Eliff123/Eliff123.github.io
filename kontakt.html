<!DOCTYPE html>
<html lang="sv">

<head>
  <meta name="description"
  content="Kontakt sida för Pärson Hotels.">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt | Pärson Hotels</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

   
   
</head>

<header></header>
<body>

  <!-- HERO -->
  <div class="hero">
    <img src="pictures/terass.webp" alt="Kontakt bild"   class="img-fluid w-100"
  style="height:60vh; object-fit:cover;">
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1>Kontakt</h1>

    <p>
      Har du frågor om bröllop, konferenser eller speciella önskemål?  
      Fyll i formuläret så återkommer vi så snabbt som möjligt.
    </p>

    <div class="contact-card">

      <form>

        <div class="row">
          <div class="col-md-6">
            <label for="Namn">Namn</label> 
            <input type="text" class="form-control" placeholder="Ditt namn">
          </div>

          <div class="col-md-6">
            <label for="E-post">E-post</label> 
            <input type="email" class="form-control" placeholder="din@mail.com">
          </div>
        </div>

        <label for="Ämne">Ämne</label> 
        <select class="form-control">
          <option></option>
    
          <option>Konferens</option>
          <option>Specialförfrågan</option>
          <option>Övrigt</option>
        </select>

        <label>Meddelande</label>
        <textarea class="form-control" rows="5" placeholder="Skriv ditt meddelande här..."></textarea>

      
      </form>

    </div>

  </div>

  <!-- FOOTER -->
  <footer></footer>
 
   
 
</body>

 <script src="init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
 



</html>
